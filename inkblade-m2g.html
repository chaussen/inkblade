<script>
'use strict';
const BUILD_ID = 'S1-M2g-b7-20260712';
/* ==== src/00-config.js ==== */
/* ========================= 00 CONFIG ========================= *
 * Every tuning number in the game lives here, [LEAN] per charter
 * protocol. Content (characters, mappings, reactions) lives in
 * pack data, never here — this file is presentation/feel tuning
 * only (handoff C4: "tuning constants at top of config").
 * ============================================================= */

// Hint tuning [LEAN — S1-D012]: flail fires on the 2nd consecutive
// non-gold resolution; idle after 6s without a cut.
const HINT_FLAIL = 2;
const HINT_IDLE_MS = 6000;
// First-glyph hint delay (John's mandate, Ninja Fruit onboarding): the
// opening character is now pre-created at boot and the title-dismissing
// swipe is a real first attempt (13-main.js/06-combat.js) — if it whiffs,
// the demonstration should feel like an immediate answer, not a second
// 3.5s wait on top of however long the player already spent reading the
// title. Was hardcoded 3500 inline.
const FIRST_HINT_DELAY_MS = 1000;

// Attention choreography [LEAN — S1-D019/D027]. The figure-ground
// contract: writing → glyph owns (world recedes behind the veil);
// lock/fizzle → bloom (world owns). Bloom holds ATTN_HOLD_MS into
// the next glyph before receding, preserving glyph cadence.
const ATTN_RECESSION   = 0.35;  // world ink presence while writing
const ATTN_VEIL_ALPHA  = 0.5;   // writing-veil opacity
const ATTN_VEIL_BRIGHT = 'rgb(250,240,219)'; // paper tone +6% brightness
const ATTN_BLOOM_MS    = 400;   // ease up to full vividness
const ATTN_RECEDE_MS   = 400;   // ease back down to recession
const ATTN_HOLD_MS     = 1500;  // bloom hold after the next glyph appears
const ATTN_VEIL_MS     = 300;   // veil fade in/out
const ATTN_VEIL_PAD    = 0.12;  // veil margin around glyph bbox, ×S

// Polyline verb model [LEAN — C1, S1-D021]: trail corner-split constants.
// These MUST stay numerically aligned with pipeline/build-packs.mjs
// (CORNER_TURN_DEG / CORNER_WINDOW_UNITS / ARC_STEP / MIN_SEG_UNITS in
// 0–100 glyph units; here scaled by S/100 to screen px) — the gesture
// classifier and the data derivation are two halves of one contract.
const TRAIL_CORNER_TURN = 50;    // degrees of windowed turn = a corner
const TRAIL_WINDOW = 0.14;       // ×S — direction-averaging window
const TRAIL_ARC_STEP = 0.035;    // ×S — uniform resample step
const TRAIL_MIN_SEG = 0.07;      // ×S — slivers below this merge away
const TRAIL_MAX_SEGS = 3;        // charter cap: ≤3 segments per stroke verb

// Ecology E2 [S1-D020 → flipped ON by S1-D056]: heat ignites flammable matter
// by proximity alone — placement is a dice roll (S1-D059), so ignition is an
// accident of where things land, not a targeted act. `?e2=0` is the kill
// switch (S1-D054 runtime resolution in 03-canvas). The covenant stands:
// ignition transforms, never destroys — kind+seed survive the burn and
// regrowth returns the same element; e1.destructions stays 0.
const E2_ENABLED = true;

// Render budget [LEAN — C4]
const MAX_PARTICLES = 600;        // glyph/fx particle pool cap
const MAX_WORLD_PARTICLES = 300;  // world-layer (leaves/embers) pool cap
const GLYPH_LOG_CAP = 200;        // per-glyph instrumentation ring buffer

const INK      = '#1b1712';
const ASH      = '#8f8a7c';
const GHOST    = 'rgba(70,62,48,0.16)';
const GOLD     = '#c9992b';
const CINNABAR = '#b2392a';
const PAPER    = '#ece3cf';
// "Inkblade Kai" is an embedded webfont (S1-D078, loaded in 13-main.js boot)
// so title/HUD/world glyph text renders identically on every browser — the
// named system fonts after it are a defense-in-depth fallback only (they're
// absent on most mobile browsers, which used to silently drop to generic
// serif and look inconsistent with desktop).
const CHAR_FONT = '"Inkblade Kai","Kaiti SC","KaiTi","STKaiti","AR PL UKai CN",serif';
// Component wash tints — the character's own anatomy as segmentation (S1-D011)
const WASHES = ['rgba(96,116,152,0.10)', 'rgba(118,134,84,0.10)', 'rgba(164,116,84,0.10)'];
// HUD bottom clearance [S1-D078]: the roster ledger used to sit 6px from the
// literal bottom of `H` (window.innerHeight) — fine on desktop's fixed chrome,
// but mobile browsers reserve variable space at the bottom edge (toolbar,
// Android gesture-nav strip) that `H` doesn't reliably exclude, so the ledger
// rendered but was clipped/covered there. This is real margin, not padding.
const HUD_BOTTOM_MARGIN = 34;

// World persistence [S1-D026]. Key name is historical; the payload
// carries the version (missing version field = implicit v1).
const WORLD_KEY = 'inkblade_world_v1';
const WORLD_BACKUP_KEY = 'inkblade_world_v1_backup';
const SAVE_VERSION = 2;
const WORLD_CAP = 300; // C4 soft budget: 60fps at 300 elements (M1d, measured by smoke12)

// World presentation layout (bands/z-order/uniqueness are shan-shui
// composition tuning; matter classes and char→element mappings are
// pack data, S1-D020/D024)
const UNIQUE = { horizon: 1, sun: 1, moon: 1 };
const ZI = { sun:0, moon:0, skylight:0, peak:1, ridge:2, terrace:3, field:3, horizon:4, tree:5, fire:5, resttree:5, dwelling:5, gate:5, path:6, seal:6, water:6, cart:6, banner:6, heart:6, bolt:6, walker:7, crowd:7, bigfig:7, horse:7, wind:7 };

// Depth staging [LEAN — S1-D041, deepened S1-D061]: the scroll's y-axis IS
// its depth axis (shan-shui convention: higher on the paper = farther away),
// so depth is a pure render projection — saves carry no new field. Ground
// elements scale from DEPTH_SCALE_FAR at GROUND_FAR to DEPTH_SCALE_NEAR at
// GROUND_NEAR and paint far→near; a mist band gives the far zone atmospheric
// perspective. S1-D061 strengthens the read: perspective x-convergence
// toward a vanishing center, per-element atmospheric fade, and contact
// shadows anchoring matter to the ground plane.
const GROUND_FAR  = 0.56;   // farthest ground y
const GROUND_NEAR = 0.96;   // nearest ground y
const DEPTH_SCALE_FAR  = 0.42;
const DEPTH_SCALE_NEAR = 1.45;
const DEPTH_EXEMPT = { horizon: 1, sun: 1, moon: 1, skylight: 1 }; // sky + the fixed reference line
const MIST_TOP = 0.55, MIST_BOTTOM = 0.72, MIST_ALPHA = 0.26;
// Second mist stage [LEAN — S1-D061]: a gentler dissolve continuing into the
// midfield, so atmosphere fades continuously with distance (it also covers
// world particles — renderers own their internal alphas, so atmospheric fade
// lives in the compositor, not per element).
const MIST2_TOP = 0.72, MIST2_BOTTOM = 0.86, MIST2_ALPHA = 0.09;
// Perspective convergence [LEAN — S1-D061]: at the far edge of the ground
// the x-field squeezes to PERSP_FAR of its width about the vanishing center;
// at the near edge it is uncompressed. Render-only — el.x stays world-space
// (saves, E1/E2 distances untouched).
const PERSP_FAR = 0.80;
// Contact shadow [LEAN — S1-D061]: the ground-anchor ellipse under matter.
const SHADOW_ALPHA = 0.12;
// Fire is light, and light reads through paper [LEAN — S1-D045]: live heat
// events (and their sparks) composite at no less than this alpha, so a burn

/* -------- the ink travels (S1-D069) -------- *

/* ==== src/08-persist.js ==== */
/* ========================= 08 PERSISTENCE ========================= *
 * Versioned saves + append-only migrations (S1-D026). A player's
 * world is never destroyed on upgrade (Q12): migrations only add
 * fields; unknown kinds are carried forward verbatim and self-heal
 * at render time (seal fallback, C3). The raw pre-migration payload
 * is copied once to a backup key before the first v2 write.
 * ================================================================== */
// Append-only: never edit an existing entry, only add the next version step.
const MIGRATIONS = {
  1: d => ({
    version: 2,
    els: (d.els || []).map(e => ({ ...e, cls: e.cls !== undefined ? e.cls : classOfKind(e.k) })),
  }),
};
function migrateSave(raw) {
  let d = JSON.parse(raw);
  let from = d.version || 1;
  let migrated = false;
  while (from < SAVE_VERSION) {
    if (!MIGRATIONS[from]) throw new Error('no migration from save v' + from);
    d = MIGRATIONS[from](d);
    from = d.version;
    migrated = true;
  }
  if (from > SAVE_VERSION) throw new Error('save from a future build (v' + from + ')');
  return { d, migrated };
}
function initWorld() {
  if (QUERY.get('reset')) { try { localStorage.removeItem(WORLD_KEY); } catch (e) {} }
  try {
    const raw = localStorage.getItem(WORLD_KEY);
    if (raw) {
      const { d, migrated } = migrateSave(raw);
      if (migrated) {
        try { if (!localStorage.getItem(WORLD_BACKUP_KEY)) localStorage.setItem(WORLD_BACKUP_KEY, raw); } catch (e) {}
      }
      state.world.els = d.els || [];
    }
  } catch (e) { console.warn('[S1] world load failed, starting fresh:', e.message); }
  // ash decays across sessions by wall clock — the scroll remembers, then
  // heals (S1-D020). Lifecycle completion is not destruction; e1.destructions
  // stays untouched here by design.
  state.world.els = state.world.els.filter(el => {
    if (!el.life || el.life.phase !== 'ash' || !el.life.wall) return true;
    el.life.t += Math.max(0, Date.now() - el.life.wall);
    return !(ECOLOGY && el.life.t >= ECOLOGY.ashDecayMs);
  });

  METRICS.world.elements = state.world.els.length;
}
function saveWorld() {
  try {
    localStorage.setItem(WORLD_KEY, JSON.stringify({
      version: SAVE_VERSION,
      els: state.world.els.map(({ k, x, y, s, seed, cls, ch, p, life, burn }) => ({
        k, x, y, s, seed, cls, ch, p,
        life: life ? { phase: life.phase, fuel: life.fuel, t: life.t, wall: Date.now() } : undefined,
        // E2 burn walk (S1-D054): additive v2 field, Q12 holds — old builds
        // ignore it; like fire's mid-burn checkpoint, it freezes while away
        burn: burn ? { phase: burn.phase, fuel: burn.fuel, t: burn.t } : undefined,
      })),
    }));
  } catch (e) {}
}

/* ==== src/09-world-sim.js ==== */
/* ========================= 09 WORLD SIM ========================= *
 * The persistent living scroll (S1-D016/D017). Planting is driven
 * entirely by pack data (`world` field): tier-1 kind + params, or
 * null → seal fallback (C3: no character locks without leaving a
 * mark). The v1 14-case switch is deleted (S1-D021.3).
 * `?seed=` routes world randomness through the seeded rng for
 * deterministic ecology scenarios (S1-D025).
 * ================================================================ */
function clamp01(v){ return Math.max(0.04, Math.min(0.96, v)); }

function placeEl(k, s, isNew){
  const [y1, y2] = bandFor(k);

  // John's playtest ruling — release point is low priority, interactions
  // should emerge from things randomly landing near each other, not from a
  // targeting act. Candidates scored by 2D distance to same-kind neighbors
  // only (the depth field, S1-D041, fills in both axes, not a strip).

function plantSeal(def, isNew){

}

/* ---------------- ecology E1 (S1-D020) ---------------- *
 * Reactive only. All thresholds and clocks come from pack data

 * the player has planted is ever destroyed or degraded in E1 —
 * the only removals here are the fire lifecycle completing (event-
 * class mortality, R4) which is design, not destruction, and is
 * counted in e1.burnouts, never e1.destructions. E2 (heat ignites

/* ---------------- ecology E2 (S1-D049/S1-D054, gated by E2_ON) ---------------- *
 * Ignition transforms, never destroys: a kindled element keeps its kind and
 * seed and walks burn → ash → sprout → sapling → ITSELF. Only live heat
 * ignites (heatSources() — fire kinds; burning matter never joins it, so
 * chains stop at one hop per S1-D049c; the sun has no life and never
 * ignites). All radii and clocks are pack data — no ignition block in the
 * pack, no ignition in the world.
 * ------------------------------------------------------------------------------ */
function updateIgnition(dt, fires){
  const IG = ECOLOGY && ECOLOGY.ignition;
  if (!IG || !ECOLOGY.regrow || !fires.length) return;
  for (const el of state.world.els){
    if (el.transit || el.burn || el.life || !kindHasTag(el.k, 'flammable')) continue;
    // dwell accumulates as a rate so mixed flame/ember exposure adds honestly;
    // embers kindle slower and closer (S1-D049d — the smolder-catch stays legible)
    let rate = 0;
    for (const f of fires){
      const P = IG[f.life.phase === 'burning' ? 'flame' : 'ember'];
      if (P && elDist(el, f) < P.r) rate = Math.max(rate, 1 / P.dwellMs);
    }
    if (rate){
      el.kindleT = (el.kindleT || 0) + dt * rate;
      if (el.kindleT >= 1){
        delete el.kindleT;
        el.burn = { phase: 'burning', fuel: ECOLOGY.fire.fuelMs * el.s, t: 0, flare: 0, nextFlare: flareIn() };
        METRICS.e2.ignitions++;
        sfxWorldCue('crackle');
        saveWorld();
      }
    } else if (el.kindleT) el.kindleT = Math.max(0, el.kindleT - dt / (IG.coolMs || 1));
  }
}
function updateBurnLife(el, dt){
  const B = el.burn, F = ECOLOGY.fire, R = ECOLOGY.regrow;
  if (B.nextFlare === undefined){ B.flare = 0; B.nextFlare = flareIn(); } // restored mid-burn from a save
  B.t += dt;
  if (B.phase === 'burning'){
    B.fuel -= dt;
    if (B.flare > 0) B.flare -= dt;
    else { B.nextFlare -= dt; if (B.nextFlare <= 0){ B.flare = F.flareMs; B.nextFlare = flareIn(); sfxWorldCue('crackle'); saveWorld(); } }
    if (B.fuel <= 0){ B.phase = 'embers'; B.t = 0; B.flare = 0; saveWorld(); }
  } else if (B.phase === 'embers'){
    if (B.t >= F.emberMs){ B.phase = 'smoke'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'smoke'){
    if (B.t >= F.smokeMs){ B.phase = 'ash'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'ash'){
    if (B.t >= R.ashMs){ B.phase = 'sprout'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'sprout'){
    if (B.t >= R.sproutMs){ B.phase = 'sapling'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'sapling'){
    // the same seed grows back: regrowth completes the covenant
    if (B.t >= R.saplingMs){ delete el.burn; METRICS.e2.regrowths++; saveWorld(); }
  }
}
function updateAgent(el, dt, fires){
  const E = ECOLOGY;
  if (!el.beh) el.beh = { home: el.x, mode: 'wander', hopT: 0, warmed: false, restCd: 0, restT: 0 };
  const B = el.beh;
  if (B.hopT > 0) B.hopT -= dt;
  if (B.restCd > 0) B.restCd -= dt;
  let near = null, nd = 1e9;
  for (const f of fires){ const d = elDist(el, f); if (d < nd){ nd = d; near = f; } }
  const dangerNow = near ? E.dangerR * (near.life.flare > 0 ? E.fire.flareBoost : 1) : 0;

  // R2: startle + flee re-center away; return after the fire dies
  if (near && nd < dangerNow && B.mode !== 'flee' && B.mode !== 'avoid'){
    B.mode = 'flee'; B.hopT = 400; B.restT = 0;
    const dir = Math.sign(el.x - near.x) || (worldRand() < 0.5 ? -1 : 1);
    B.target = clamp01(near.x + dir * E.fleeDist);
    METRICS.e1.startles++;
    sfxWorldCue('startle');
  }
  const speed = E.walkSpeed * (B.mode === 'flee' ? E.fleeSpeedMult : 1) * dt / 1000;
  if (B.mode === 'flee'){
    el.x = stepX(el.x, B.target, speed);
    if (el.x === B.target) B.mode = 'avoid';
  } else if (B.mode === 'avoid'){
    if (!near) B.mode = 'return'; // fire died — come back
  } else if (B.mode === 'return'){
    el.x = stepX(el.x, B.home, speed);
    if (el.x === B.home){ B.mode = 'wander'; B.warmed = false; }
  } else if (B.mode === 'rest'){
    B.restT -= dt;
    if (B.restT <= 0){ B.mode = 'wander'; B.restCd = E.restCooldownMs; }
  } else { // wander
    // R1: comfort-radius warming — drift toward the fire, loiter at warmDist
    if (near && nd < E.comfortR && nd > E.warmDist){
      const dir = Math.sign(near.x - el.x) || 1;
      el.x = stepX(el.x, clamp01(near.x - dir * E.warmDist), speed);
      if (!B.warmed){ B.warmed = true; METRICS.e1.warmings++; }
    } else if (!near) B.warmed = false;
    // R3: an occasional rest beat under shelter
    if (B.restCd <= 0){
      const sheltered = state.world.els.some(e => e !== el && kindHasTag(e.k, 'shelter') && elDist(el, e) < E.shelterR);
      if (sheltered && worldRand() < E.restChancePerSec * dt / 1000){
        B.mode = 'rest'; B.restT = E.restMs; METRICS.e1.rests++;
      }
    }
  }
}
function stepX(x, target, maxStep){
  const d = target - x;
  return Math.abs(d) <= maxStep ? target : x + Math.sign(d) * maxStep;
}

/* ==== src/10-world-render.js ==== */
/* ========================= 10 WORLD RENDER ========================= *
 * Elements draw into the offscreen world layer (`wx`), which the
 * frame composites at the attention worldAlpha — recession is an
 * exact global-alpha multiplier on the whole world plane (S1-D019).
 * Kind → draw fn is a registry; kinds without an entry render as a
 * seal/stele (C3 self-healing — old saves with unknown kinds keep
 * their marks). World-born particles (leaves, embers) live in the
 * world layer so they recede with it.
 * =================================================================== */
const ELEMENT_DRAW = {
  tree: drawTreeEl, fire: drawFireEl, walker: drawWalkerElSolo, crowd: drawCrowdEl,
  resttree: drawRestTreeEl, peak: drawPeakEl, ridge: drawRidgeEl,
  terrace: drawTerraceEl, horizon: drawHorizonEl, path: drawPathEl, seal: drawSealEl,
  sun: drawSunEl, moon: drawMoonEl, field: drawFieldEl, water: drawWaterEl,
  flora: drawFloraEl, terrain: drawTerrainEl, figure: drawFigureEl,
  // chunk C batch 1 (S1-D066): every character earns a face
  bigfig: drawBigFigEl, gate: drawGateEl, horse: drawHorseEl, heart: drawHeartEl,
  wind: drawWindEl, bolt: drawBoltEl, cart: drawCartEl,
  banner: drawBannerEl, dwelling: drawDwellingEl, skylight: drawSkylightEl,

/* -------- the world breathes (S1-D072): motion-parallax camera -------- *
 * Idle drift + pointer pan, eased; each depth layer shifts proportionally
 * (near slides most, sky not at all). Render-only — worldScreenX, el.x,
 * saves, and every sim distance are untouched. The pan target freezes
 * while a trail is active so writing is never disturbed; reduced-motion
 * pins the camera at 0. */
const CAM = { px: 0, target: 0 };
window.__S1_CAM = CAM; // test-readable (smoke21)
function camAim(e){
  CAM.target = Math.max(-1, Math.min(1, (e.clientX / W - 0.5) * 2));
}
window.addEventListener('pointermove', e => {
  if (trail || reduceMotion) return; // never steer the camera mid-slash
  camAim(e);
}, { passive: true });
// Touch has no hover — pointermove only fires DURING contact, and any touch
// drag on the fullscreen canvas immediately becomes a writing trail (05-
// input.js sets it on pointerdown), so the listener above never fires for a
// finger (S1-D077, found by playtest: "pointer does not affect camera at
// all" on mobile). A pointerdown nudge — before trail is assigned — gives
// touch (and a plain mouse click) at least an aim-toward-there cue; it
// can't hover-orbit, but it isn't inert either.
window.addEventListener('pointerdown', e => {
  if (reduceMotion) return;
  camAim(e);
}, { passive: true, capture: true });
function updateCamera(dt, now){
  if (reduceMotion){ CAM.px = 0; return; }
  const drift = (Math.sin(now / 4200) + 0.35 * Math.sin(now / 1530)) * CAM_DRIFT * W;
  const want = CAM.target * CAM_POINTER * W + drift;
  CAM.px += (want - CAM.px) * Math.min(1, dt / CAM_EASE_MS);
}
// Per-layer shift for a world element (0 for the exempt sky/horizon).
function camShiftFor(el){
  if (DEPTH_EXEMPT[el.k]) return 0;
  return CAM.px * (PARALLAX_FAR + depthQ(el) * (PARALLAX_NEAR - PARALLAX_FAR));
}
// The ash/sprout/sapling/base draw decision (S1-D054), factored out so the
// WebGL pilot's offscreen sprite stamp (S1-D075) can reuse the EXACT SAME
// "what does this element currently look like" logic the 2D path uses —
// one definition, two consumers, never drifting apart. No glow/particles
// here (drawBurnFx is a separate call the 2D loop makes only for live
// burning/embers/smoke phases) — a stamp texture shouldn't carry FX.
function drawGroundMatter(el, draw, now, pe){
  const bp = el.burn && el.burn.phase;
  if (bp === 'ash') { drawBurnAsh(el, now, pe); return; }
  if (bp === 'sprout') { drawBurnSprout(el, now, pe); return; }
  if (bp === 'sapling'){
    const q = ECOLOGY && ECOLOGY.regrow ? Math.min(1, el.burn.t / ECOLOGY.regrow.saplingMs) : 1;
    const young = { ...el, s: el.s * (0.35 + 0.65 * q) };
    if (draw) draw(young, now, pe); else { el.sealFallback = true; drawSealEl(el, now, pe); }
    return;
  }
  if (draw) draw(el, now, pe);
  else { el.sealFallback = true; drawSealEl(el, now, pe); } // unknown kind self-heals to a seal
}
function drawWorld(dt, now){
  // the backdrop means an empty world is still a place (S1-D063/D064) —
  // the old empty-world early-return is gone
  METRICS.perf.worldLayer = state.world.els.length > 0 || state.worldParticles.length > 0;
  updateCamera(dt, now);
  const worldCtx = wx;
  worldCtx.clearRect(0, 0, W, H);
  ex.clearRect(0, 0, W, H);
  drawBackdrop(now);
  // the WebGL pilot (S1-D075, ?r3d=1) takes over ground-matter rendering —
  // default path (r3d unset, or GL init failed) is drawGroundElements2D,
  // byte-identical to the pre-pilot build
  if (R3D_ON && r3dReady()) drawGroundR3D(now);
  else drawGroundElements2D(now);
  wx = worldCtx;
  drawMist();
  drawForeground();
  drawWorldParticles(dt);
  ctx.save();
  ctx.globalAlpha = attention.worldAlpha;
  ctx.drawImage(worldLayer, 0, 0, W, H);
  // fire is light: live events hold ≥EVENT_MIN_ALPHA under the veil
  ctx.globalAlpha = Math.max(attention.worldAlpha, EVENT_MIN_ALPHA);
  ctx.drawImage(eventLayer, 0, 0, W, H);
  ctx.restore();
}
function drawGroundElements2D(now){
  const worldCtx = wx;
  // painter's algorithm down the depth axis (S1-D041): sky first, then
  // ground far→near so near occludes far — y is depth
  const els = [...state.world.els].sort((a, b) =>
    (ZI[a.k] === 0 ? -1 : a.y) - (ZI[b.k] === 0 ? -1 : b.y));
  drawContactShadows(els, now);
  for (const el of els){
    if (el.transit) continue; // ink in flight — it hasn't landed yet (S1-D069)
    const age = el.born ? now - el.born : 1e9;
    if (age < 0) continue; // planted between frames; rAF timestamp lags performance.now()
    const p = Math.max(0, Math.min(1, age / 700));
    const pe = 1 - Math.pow(1 - p, 3);
    // live heat draws on the burn-through overlay (S1-D045); all else recedes
    wx = isLiveHeat(el) ? ex : worldCtx;
    const k = depthK(el);
    wx.save();
    // perspective convergence (S1-D061) + camera parallax (S1-D072): shift
    // the whole element to its converged, camera-shifted screen x —
    // renderers keep drawing at el.x*W and inherit both
    const cdx = (worldScreenX(el) - el.x) * W + camShiftFor(el);
    if (cdx) wx.translate(cdx, 0);
    if (k !== 1){
      // scale the whole element (line weights included) about its ground anchor
      const ax = el.x * W, ay = el.y * H;
      wx.translate(ax, ay); wx.scale(k, k); wx.translate(-ax, -ay);
    }
    const draw = ELEMENT_DRAW[el.k];
    // E2 burn walk (S1-D054): a kindled element's regrowth phases REPLACE its
    // form (ash mound → sprout → sapling of the SAME seed growing back);
    // while it burns, its matter stays on the world layer and its fire is
    // drawn as light on the burn-through overlay.
    const bp = el.burn && el.burn.phase;
    drawGroundMatter(el, draw, now, pe);
    if (bp && bp !== 'ash' && bp !== 'sprout' && bp !== 'sapling') drawBurnFx(el, now, pe);
    if (el.fresh && age < 900){
      const q = age / 900;
      wx.save();
      wx.globalAlpha = (1 - q) * 0.6;
      wx.strokeStyle = GOLD; wx.lineWidth = 2.5;
      wx.beginPath(); wx.arc(el.x * W, el.y * H - S * 0.03, 10 + q * S * 0.12, 0, Math.PI * 2); wx.stroke();
      wx.restore();
    }
    wx.restore();
  }
}
/* -------- the illustrated valley (S1-D063/D064) -------- *
 * An always-present backdrop so the world reads as a PLACE, not a void:
 * distant ridgelines, drifting clouds, ground tufts with perspective
 * density. Pure presentation furniture — no pack content, no save impact,
 * laid out from a FIXED seed (the valley is the same place every session;
 * ?seed= world randomness is untouched). It draws on the world layer, so
 * it recedes behind the veil while writing and blooms on lock like the
 * rest of the living scroll. Geometry is cached per resize; the per-frame
 * cost is a handful of path fills. Tones sit far above every ink-probe
 * threshold — silk, not ink (smoke18 T5/T6). */
let BACKDROP = null;
function buildBackdrop(){
  const r = rng(42);
  const ridges = [];
  // three overlapping ridgelines above the horizon band, farther = paler
  for (let i = 0; i < 3; i++){
    const baseY = 0.555 - i * 0.035;
    const pts = [];
    const n = 7 + Math.floor(r() * 3);
    for (let j = 0; j <= n; j++){
      const px = j / n;
      pts.push([px, baseY - (0.025 + r() * 0.045) * Math.sin(px * Math.PI * (1.5 + i * 0.5) + r() * 2) - r() * 0.012]);
    }
    ridges.push({ pts, baseY, alpha: 0.20 - i * 0.055 });
  }
  const clouds = [];
  for (let i = 0; i < 4; i++){
    clouds.push({
      x: r(), y: 0.10 + r() * 0.22, s: 0.5 + r() * 0.8,
      speed: 0.000007 + r() * 0.000005, puffs: 3 + Math.floor(r() * 2), seed: Math.floor(r() * 1e6),
    });
  }
  const tufts = [];
  for (let i = 0; i < 56; i++){
    const q = Math.pow(r(), 0.75); // denser near
    const y = GROUND_FAR + 0.03 + q * (1 - GROUND_FAR - 0.06);
    const f = PERSP_FAR + q * (1 - PERSP_FAR);
    tufts.push({ x: 0.5 + (r() - 0.5) * 0.96 * f, y, q, kind: r() < 0.75 ? 'grass' : 'pebble', seed: Math.floor(r() * 1e6) });
  }
  // foreground occluder band (S1-D072): a few large near-field clumps that
  // slide FASTEST and stand in front of near matter — the depth sandwich.
  // Non-overlapping by construction; each draws as ONE single-fill path
  // (the S1-D062 batched-shadow trick), so self-overlap can never darken
  // below the ink-probe thresholds.
  const fg = [];
  for (let i = 0; i < FG_CLUMPS; i++){
    const x = (i + 0.15 + r() * 0.7) / FG_CLUMPS; // one per lane — never overlapping
    fg.push({ x, y: 0.965 + r() * 0.045, s: 0.8 + r() * 0.5,
              kind: r() < 0.7 ? 'grass' : 'stone', seed: Math.floor(r() * 1e6) });
  }
  BACKDROP = { ridges, clouds, tufts, fg };
  window.__S1_SCENE = { ridges: ridges.length, clouds: clouds.length, tufts: tufts.length, fg: fg.length };
}
function drawBackdrop(now){
  if (!BACKDROP) buildBackdrop();
  const B = BACKDROP;
  wx.save();
  // ridgelines, far to near — each slides a touch under the camera (S1-D072)
  for (let i = B.ridges.length - 1; i >= 0; i--){
    const rd = B.ridges[i];
    const shift = CAM.px * (0.10 - i * 0.03);
    wx.fillStyle = 'rgba(122,132,152,' + rd.alpha + ')';
    wx.beginPath();
    wx.moveTo(-24, GROUND_FAR * H + 6);
    for (const [px, py] of rd.pts) wx.lineTo(px * W + shift, py * H);
    wx.lineTo(W + 24, GROUND_FAR * H + 6);
    wx.closePath(); wx.fill();
  }
  // clouds — brighter than the paper, drifting slowly (a child can watch one cross)
  for (const c of B.clouds){
    const cx = ((c.x + now * c.speed) % 1.2 - 0.1) * W + CAM.px * 0.06;
    const cy = c.y * H, cs = S * 0.09 * c.s;
    wx.fillStyle = 'rgba(252,249,240,0.55)';
    for (let j = 0; j < c.puffs; j++){
      const ox = (j - (c.puffs - 1) / 2) * cs * 0.75;
      const rr = cs * (0.55 + (((c.seed >> j) % 5) / 10));
      wx.beginPath(); wx.ellipse(cx + ox, cy + (j % 2 ? cs * 0.10 : 0), rr, rr * 0.62, 0, 0, Math.PI * 2); wx.fill();
    }
  }
  // ground tufts + pebbles, perspective-scaled, camera-shifted by depth
  for (const t of B.tufts){
    const X = t.x * W + CAM.px * (PARALLAX_FAR + t.q * (PARALLAX_NEAR - PARALLAX_FAR)), Y = t.y * H;
    const k = DEPTH_SCALE_FAR + t.q * (DEPTH_SCALE_NEAR - DEPTH_SCALE_FAR);
    if (t.kind === 'grass'){
      const h = S * 0.016 * k;
      wx.strokeStyle = 'rgba(122,136,96,0.30)'; wx.lineWidth = Math.max(0.7, h * 0.12); wx.lineCap = 'round';
      for (let j = -1; j <= 1; j++){
        wx.beginPath(); wx.moveTo(X, Y);
        wx.quadraticCurveTo(X + j * h * 0.35, Y - h * 0.6, X + j * h * 0.7, Y - h * (0.8 + (j === 0 ? 0.25 : 0)));
        wx.stroke();
      }
    } else {
      const w2 = S * 0.007 * k;
      wx.fillStyle = 'rgba(150,142,126,0.32)';
      wx.beginPath(); wx.ellipse(X, Y, w2, w2 * 0.6, 0, 0, Math.PI * 2); wx.fill();
    }
  }
  wx.restore();
}
// Foreground occluder band (S1-D072): large near-field clumps drawn OVER
// the element pass, sliding fastest under the camera — matter now has
// things both behind and in front of it. Each clump is ONE single-fill
// path at low alpha (self-overlap can't double-darken, so the blended tone
// stays far above every ink-probe threshold — silk, not ink).
function drawForeground(){
  if (!BACKDROP) return;
  wx.save();
  for (const f of BACKDROP.fg){
    const X = f.x * W + CAM.px * PARALLAX_FG;
    const Y = f.y * H;
    const r = rng(f.seed);
    if (f.kind === 'grass'){
      const h = S * 0.10 * f.s;
      wx.fillStyle = 'rgba(108,122,86,0.32)';
      wx.beginPath();
      const n = 5;
      for (let i = 0; i < n; i++){
        const a = (i / (n - 1) - 0.5) * 1.3 + (r() - 0.5) * 0.25;
        const bh = h * (0.6 + r() * 0.5);
        const bx = X + a * bh * 0.9, bw = h * 0.045;
        wx.moveTo(X - bw + i * bw * 0.4, Y);
        wx.quadraticCurveTo(X + a * bh * 0.4, Y - bh * 0.65, bx, Y - bh);
        wx.quadraticCurveTo(X + a * bh * 0.5 + bw, Y - bh * 0.55, X + bw + i * bw * 0.4, Y);
        wx.closePath();
      }
      wx.fill();
    } else {
      const w2 = S * 0.05 * f.s;
      wx.fillStyle = 'rgba(138,130,114,0.34)';
      wx.beginPath();
      wx.moveTo(X - w2, Y);
      wx.quadraticCurveTo(X - w2 * 0.7, -w2 * 0.75 + Y, X - w2 * 0.1, Y - w2 * (0.8 + r() * 0.2));
      wx.quadraticCurveTo(X + w2 * 0.65, Y - w2 * 0.7, X + w2, Y);

// Contact shadows (S1-D061): a soft ground ellipse anchors matter to the
// plane — under everything except sky/horizon, heat (fire is light), and wet
// matter (a pool casts nothing). All shadows are ONE batched path filled at a
// single alpha (perf: one fill, and overlaps never double-darken); depth
// scale and convergence are applied numerically, no per-element transforms.
function drawContactShadows(els, now){
  wx.save();
  wx.globalAlpha = SHADOW_ALPHA;
  wx.fillStyle = 'rgba(60,52,40,1)';
  wx.beginPath();
  for (const el of els){
    if (el.transit || DEPTH_EXEMPT[el.k] || kindHasTag(el.k, 'heat') || kindHasTag(el.k, 'wet')) continue;
    const age = el.born ? now - el.born : 1e9;
    if (age < 0) continue;
    const pe = 1 - Math.pow(1 - Math.max(0, Math.min(1, age / 700)), 3);
    const k = depthK(el);
    const sx = worldScreenX(el) * W + camShiftFor(el), sy = el.y * H + S * 0.004 * k;
    const rx = S * 0.05 * el.s * k * pe, ry = S * 0.013 * el.s * k * pe;
    if (rx < 1) continue;
    wx.moveTo(sx + rx, sy);
    wx.ellipse(sx, sy, rx, ry, 0, 0, Math.PI * 2);
  }
  wx.fill();
  wx.restore();
}
// Atmospheric perspective (S1-D041, deepened S1-D061): a paper-tone mist
// band over the far zone, then a gentler second stage dissolving on into the
// midfield — distance reads as ink dissolving into the paper, the shan-shui
// way, and the fade is continuous instead of a single band.
function drawMist(){
  const y0 = MIST_TOP * H, y1 = MIST_BOTTOM * H;
  const g = wx.createLinearGradient(0, y0, 0, y1);
  g.addColorStop(0, 'rgba(236,227,207,' + MIST_ALPHA + ')');
  g.addColorStop(1, 'rgba(236,227,207,' + MIST2_ALPHA + ')');
  wx.fillStyle = g;
  wx.fillRect(0, y0, W, y1 - y0);
  const y2 = MIST2_BOTTOM * H;
  const g2 = wx.createLinearGradient(0, y1, 0, y2);
  g2.addColorStop(0, 'rgba(236,227,207,' + MIST2_ALPHA + ')');
  g2.addColorStop(1, 'rgba(236,227,207,0)');
  wx.fillStyle = g2;
  wx.fillRect(0, y1, W, y2 - y1);
}
function drawWorldParticles(dt) {
  for (const p of state.worldParticles) {
    p.life -= dt / 1000;
    p.vy += p.grav * dt / 1000;
    p.x += p.vx * dt / 1000; p.y += p.vy * dt / 1000;

/* ==== src/11-attention.js ==== */
/* ========================= 11 ATTENTION ========================= *
 * The figure-ground contract (S1-D019/D027): exactly one plane owns
 * attention, game state drives transitions. writing → glyph owns
 * (world recedes to ATTN_RECESSION behind the veil); bloom → world
 * owns (lock/fizzle through resolve, holding ATTN_HOLD_MS into the
 * next glyph); idle → title screen, world owns. Test-readable at
 * window.__S1_ATTN.
 * ================================================================ */
const attention = { mode: 'idle', worldAlpha: 1, veilAlpha: 0, holdUntil: 0 };
window.__S1_ATTN = attention;

function attentionOnGlyphAppear() {
  // bloom holds into the new glyph, then recedes (cadence-preserving
  // reading of "holds through resolve + ~1.5s after")
  if (METRICS.glyphs > 0) attention.holdUntil = performance.now() + ATTN_HOLD_MS;
}
function stepToward(cur, target, maxStep) {
  const d = target - cur;
  return Math.abs(d) <= maxStep ? target : cur + Math.sign(d) * maxStep;
}
function updateAttention(dt, now) {
  let mode;
  if (state.mode === 'play' && state.glyph && !state.glyph.done) mode = 'writing';
  else if (state.mode === 'resolve' || (state.glyph && state.glyph.done)) mode = 'bloom';
  else mode = 'idle';
  attention.mode = mode;
  const wTarget = (mode === 'writing' && now >= attention.holdUntil) ? ATTN_RECESSION : 1;
  const vTarget = mode === 'writing' ? ATTN_VEIL_ALPHA : 0;
  const wRange = 1 - ATTN_RECESSION;
  const wMs = wTarget < attention.worldAlpha ? ATTN_RECEDE_MS : ATTN_BLOOM_MS;
  attention.worldAlpha = stepToward(attention.worldAlpha, wTarget, dt / wMs * wRange);
  attention.veilAlpha = stepToward(attention.veilAlpha, vTarget, dt / ATTN_VEIL_MS * ATTN_VEIL_ALPHA);
}
// The writing veil: a fresh leaf laid over the scroll behind the glyph.
// Drawn between the world layer and the glyph.
function drawVeil() {
  if (attention.veilAlpha <= 0.005 || !state.glyph) return;
  const pad = S * ATTN_VEIL_PAD;
  const [x, y, w, h] = glyphBBox(state.glyph, pad);
  const cx = x + w/2, cy = y + h/2;
  const R = Math.hypot(w, h) * 0.62;
  const g = ctx.createRadialGradient(cx, cy, R * 0.55, cx, cy, R);
  const c = ATTN_VEIL_BRIGHT.slice(4, -1); // "r,g,b"
  g.addColorStop(0, 'rgba(' + c + ',' + attention.veilAlpha + ')');
  g.addColorStop(1, 'rgba(' + c + ',0)');
  ctx.save();
  ctx.fillStyle = g;
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
  ctx.restore();
}

  const st = g.strokes[0];
  const a = toScreen(st.pts[0]), b = toScreen(st.pts[st.pts.length - 1]);
  const x = a[0] + (b[0]-a[0]) * q, y = a[1];
  ctx.save();
  ctx.globalAlpha = 0.5 * Math.sin(q * Math.PI);
  ctx.fillStyle = INK;
  ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
  for (let i = 1; i <= 4; i++) {
    ctx.globalAlpha = 0.5 * Math.sin(q * Math.PI) * (1 - i/5);
    ctx.beginPath(); ctx.arc(x - i*11, y, 7 - i, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ==== src/13-main.js ==== */
/* ========================= 13 MAIN LOOP + BOOT ========================= */
let lastT = 0, perfT = 0, frameCount = 0;
function frame(now) {
  const dt = Math.min(50, now - lastT || 16);
  lastT = now; perfT = now;
  frameCount++;
  // frame-time probe (S1-D031: measure before pre-render machinery)
  if (frameCount > 10) {
    METRICS.perf.avgFrameMs = +(METRICS.perf.avgFrameMs * 0.98 + dt * 0.02).toFixed(2);
    METRICS.perf.worstFrameMs = Math.max(METRICS.perf.worstFrameMs, Math.round(dt));
  }

  updateAttention(dt, now);

  ctx.save();
  if (state.shake > 0 && !reduceMotion) {
    ctx.translate((Math.random()-0.5) * state.shake, (Math.random()-0.5) * state.shake);
    state.shake = Math.max(0, state.shake - dt / 40);
  }
  ctx.drawImage(paperTex, 0, 0, W, H);
  updateWorld(dt, now);
  drawWorld(dt, now);

  if (state.mode === 'title') {
    drawTitle();
  } else {
    drawVeil();
    drawGlyph(dt, now);
    drawFirstGlyphHint(dt, now);
    if (state.mode === 'play') maybeHint(now);
  }
  drawEffects(dt);
  drawParticles(dt);
  drawTrails(dt);
  drawTransit(dt); // the ink travels above the veil (S1-D069)
  if (state.mode !== 'title') drawHUD();
  ctx.restore();

  if (state.mode === 'resolve' && state.resolve) {
    state.resolve.t += dt;
    if (state.resolve.t >= state.resolve.dur) { state.resolve = null; advance(); }
  }
  requestAnimationFrame(frame);
}
// Embedded webfont load (S1-D078): CHAR_FONT's first name only renders
// consistently if this resolves before the first frame — boot() awaits it.
// Any failure (old browser, malformed data) just leaves the CSS fallback
// stack in CHAR_FONT to do what it always did; never blocks boot.
function loadFont() {
  return new Promise(resolve => {
    if (!window.FontFace) return resolve();
    try {
      const b64 = document.getElementById('font-inkblade').textContent.trim();
      const face = new FontFace('Inkblade Kai', 'url(data:font/woff2;base64,' + b64 + ')');
      face.load().then(
        f => { document.fonts.add(f); resolve(); },
        e => { console.warn('[S1] embedded font failed to load, using fallback stack:', e.message); resolve(); }
      );
    } catch (e) { console.warn('[S1] embedded font unavailable:', e.message); resolve(); }
  });
}
async function boot() {
  await loadFont();
  loadEmbeddedPack();
  if (PACK_URL) await loadPackParam(PACK_URL);
  initWorld();
  // Ninja Fruit mandate (John): "slash anywhere to begin" used to be a
  // throwaway trigger — the swipe that dismissed the title was discarded,
  // never evaluated as a cut. Pre-creating the opening glyph here means
  // resolveSlash (06-combat.js) has real strokes to test that exact trail
  // against the instant the title is dismissed — the trigger swipe IS the
  // first attempt, whiff-or-hit, not a freebie. state.mode stays 'title'
  // (still renders the title screen) until the player actually acts.
  newGlyph(pickNext());
  requestAnimationFrame(frame);
  if (window.speechSynthesis) speechSynthesis.getVoices();
}
boot();

/* ==== src/14-webgl.js ==== */
/* ========================= 14 WEBGL PILOT (S1-D075) ========================= *
 * Experimental true-3D world layer, gated behind ?r3d=1 — John's "just
 * acceptable" verdict on the parallax camera (S1-D074) plus his explicit
 * ask to try WebGL. Raw WebGL (no three.js, no dependency — the ~150-line
 * matrix/render code below IS the whole "library"; the single-file,
 * dependency-free build discipline holds). Presentation-only: el.x/el.y,
 * saves, and every sim distance are read exactly as the 2D path reads them
 * (depthQ, unchanged) — nothing here can affect a save file or a suite that
 * asserts world state. Default OFF (r3d unset); if WebGL context creation
 * fails for any reason, r3dReady() returns false and drawWorld silently
 * uses the existing 2D path — the pilot can never crash the game.
 *
 * The trick that makes this affordable: every kind's LOOK already exists as
 * a 2D brush-renderer function (10-world-render.js). Rather than duplicate
 * that art for a 3D pipeline, an offscreen "stamp" canvas calls the SAME
 * functions (through drawGroundMatter, shared with the 2D path) with W/H/S/
 * wx temporarily swapped to the stamp's small canvas, and uploads the
 * result as a billboard texture — every character's existing symbol just
 * becomes a sprite standing in a real 3D scene.
 *
 * Logged pilot limitations (honest, not hidden): no ground-plane ambient
 * particles (leaves, steam) in 3D space — 2D-only for now; the base `fire`
 * kind's flame animates via the ~140ms texture refresh, not true per-frame
 * flicker; no contact shadows. E2 ignition glow (fire↔flammable — the
 * mechanic closest to the coming sandbox-interaction milestone, S1-D068(3))
 * DOES stay live every frame via drawBurnFx's position override. */
const R3D_ON = QUERY.get('r3d') === '1';
window.__S1_R3D = { on: R3D_ON, active: false, fallback: null };

/* ---- tiny column-major mat4 (hand-rolled, no dependency) ---- */
function m4Multiply(a, b){
  const o = new Float32Array(16);
  for (let c = 0; c < 4; c++) for (let r = 0; r < 4; r++){
    let s = 0;
    for (let k = 0; k < 4; k++) s += a[k * 4 + r] * b[c * 4 + k];
    o[c * 4 + r] = s;
  }
  return o;
}
function m4Perspective(fovY, aspect, near, far){
  const f = 1 / Math.tan(fovY / 2), nf = 1 / (near - far);
  const o = new Float32Array(16);
  o[0] = f / aspect; o[5] = f; o[10] = (far + near) * nf; o[11] = -1; o[14] = 2 * far * near * nf;
  return o;
}
function m4LookAt(eye, center, up){
  let zx = eye[0] - center[0], zy = eye[1] - center[1], zz = eye[2] - center[2];
  const zl = Math.hypot(zx, zy, zz) || 1; zx /= zl; zy /= zl; zz /= zl;
  let xx = up[1] * zz - up[2] * zy, xy = up[2] * zx - up[0] * zz, xz = up[0] * zy - up[1] * zx;
  const xl = Math.hypot(xx, xy, xz) || 1; xx /= xl; xy /= xl; xz /= xl;
  const yx = zy * xz - zz * xy, yy = zz * xx - zx * xz, yz = zx * xy - zy * xx;
  const o = new Float32Array(16);
  o[0] = xx; o[1] = yx; o[2] = zx; o[3] = 0;
  o[4] = xy; o[5] = yy; o[6] = zy; o[7] = 0;
  o[8] = xz; o[9] = yz; o[10] = zz; o[11] = 0;
  o[12] = -(xx * eye[0] + xy * eye[1] + xz * eye[2]);
  o[13] = -(yx * eye[0] + yy * eye[1] + yz * eye[2]);
  o[14] = -(zx * eye[0] + zy * eye[1] + zz * eye[2]);
  o[15] = 1;
  return o;
}
function m4TransformPoint(m, p){
  const x = p[0], y = p[1], z = p[2], w = p[3];
  return [
    m[0] * x + m[4] * y + m[8] * z + m[12] * w,
    m[1] * x + m[5] * y + m[9] * z + m[13] * w,
    m[2] * x + m[6] * y + m[10] * z + m[14] * w,
    m[3] * x + m[7] * y + m[11] * z + m[15] * w,
  ];
}

const R3D = {
  gl: null, glCanvas: null, program: null, ready: false,
  aCorner: -1, uViewProj: -1, uView: -1, uCenter: -1, uContentSize: -1, uUVRect: -1,
  uFogColor: -1, uFogNear: -1, uFogFar: -1, uTex: -1,
  quadBuf: null, view: null, proj: null, viewProj: null,
  textures: new Map(), stampCanvas: null, stampCtx: null,
};
let RASTERIZING_SPRITE = false; // guards addParticle (06-combat.js) during sprite stamping
function r3dReady(){ return R3D.ready; }

function r3dCompile(gl, type, src){
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
    const info = gl.getShaderInfoLog(sh);
    gl.deleteShader(sh);
    throw new Error('shader compile failed: ' + info);
  }
  return sh;
}
function r3dInit(){
  if (!R3D_ON) return;
  try {
    const c = document.createElement('canvas');
    c.width = Math.max(1, W * DPR); c.height = Math.max(1, H * DPR);
    const gl = c.getContext('webgl', { alpha: true, antialias: true, premultipliedAlpha: true })
            || c.getContext('experimental-webgl', { alpha: true });
    if (!gl) throw new Error('no webgl context available');
    const vsSrc =
      'attribute vec2 aCorner;' + // fixed unit quad: x -0.5..0.5, y 0(ground)..1(top) — same for every sprite
      'uniform vec3 uCenter; uniform vec2 uContentSize; uniform vec4 uUVRect;' + // uUVRect = (u0, vTop, u1, vBottom)
      'uniform mat4 uViewProj; uniform mat4 uView;' +
      'varying vec2 vUV; varying float vFogDist;' +
      'void main(){' +
      '  vec3 right = vec3(uView[0][0], uView[1][0], uView[2][0]);' + // row 0 of the view rotation = the camera-right vector in world space
      '  vec3 up = vec3(0.0, 1.0, 0.0);' +
      '  vec3 pos = uCenter + right * (aCorner.x * uContentSize.x) + up * (aCorner.y * uContentSize.y);' +
      '  vec4 clip = uViewProj * vec4(pos, 1.0);' +
      '  gl_Position = clip;' +
      // the quad is CROPPED to each texture's actual drawn-content bbox (not
      // the whole mostly-empty stamp canvas) — a tight quad in both geometry
      // and UV, so nothing is wasted and nothing clips unpredictably (the
      // bug the pilot's first two attempts hit: a huge, mostly-transparent
      // quad sized to the full canvas produced unreadable near-plane clipping)
      '  vUV = vec2(mix(uUVRect.x, uUVRect.z, aCorner.x + 0.5), mix(uUVRect.w, uUVRect.y, aCorner.y));' +
      '  vFogDist = clip.w;' +
      '}';
    const fsSrc =
      'precision mediump float;' +
      'varying vec2 vUV; varying float vFogDist;' +
      'uniform sampler2D uTex; uniform vec3 uFogColor; uniform float uFogNear; uniform float uFogFar;' +
      'void main(){' +
      '  vec4 c = texture2D(uTex, vUV);' +
      '  if (c.a < 0.06) discard;' +
      '  float fog = clamp((vFogDist - uFogNear) / (uFogFar - uFogNear), 0.0, 1.0);' +
      '  vec3 rgb = mix(c.rgb, uFogColor, fog * 0.85);' +
      '  gl_FragColor = vec4(rgb, c.a);' +
      '}';
    const prog = gl.createProgram();
    gl.attachShader(prog, r3dCompile(gl, gl.VERTEX_SHADER, vsSrc));
    gl.attachShader(prog, r3dCompile(gl, gl.FRAGMENT_SHADER, fsSrc));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error('program link failed: ' + gl.getProgramInfoLog(prog));
    R3D.gl = gl; R3D.glCanvas = c; R3D.program = prog;
    R3D.aCorner = gl.getAttribLocation(prog, 'aCorner');
    R3D.uViewProj = gl.getUniformLocation(prog, 'uViewProj');
    R3D.uView = gl.getUniformLocation(prog, 'uView');
    R3D.uCenter = gl.getUniformLocation(prog, 'uCenter');
    R3D.uContentSize = gl.getUniformLocation(prog, 'uContentSize');
    R3D.uUVRect = gl.getUniformLocation(prog, 'uUVRect');
    R3D.uFogColor = gl.getUniformLocation(prog, 'uFogColor');
    R3D.uFogNear = gl.getUniformLocation(prog, 'uFogNear');
    R3D.uFogFar = gl.getUniformLocation(prog, 'uFogFar');
    R3D.uTex = gl.getUniformLocation(prog, 'uTex');
    // a fixed unit quad, ground at y=0 (aCorner.y=0), top at y=1 — every
    // sprite's actual on-screen size/crop comes from per-draw uniforms
    // (uContentSize, uUVRect), not from this geometry
    R3D.quadBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, R3D.quadBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-0.5, 0, 0.5, 0, -0.5, 1, 0.5, 1]), gl.STATIC_DRAW);
    R3D.stampCanvas = document.createElement('canvas');
    R3D.stampCanvas.width = R3D_STAMP; R3D.stampCanvas.height = R3D_STAMP;
    R3D.stampCtx = R3D.stampCanvas.getContext('2d');
    R3D.ready = true;
    window.__S1_R3D.active = true;
  } catch (e) {
    console.warn('[S1] WebGL pilot unavailable, using the 2D world layer:', e.message);
    window.__S1_R3D.fallback = e.message;
    R3D.ready = false;
  }
}
r3dInit();

function r3dWorldPos(el){
  // the camera sits at negative Z looking toward +Z, so NEAR (large el.y,
  // depthQ→1) must map to SMALL Z (close to the eye) and FAR to LARGE Z —
  // (1-depthQ) is the correct direction, not depthQ itself
  return [(el.x - 0.5) * 2 * R3D_HALF_W, 0, (1 - depthQ(el)) * R3D_DEPTH];
}
function r3dUpdateCamera(){
  // the eye swings sideways while the look-at point stays nearly fixed —
  // a real orbit around the scene, not a translate (S1-D077: the pilot's
  // first camera formula moved eye and center almost together, which read
  // as barely-there even when CAM.px was genuinely changing)
  const pan = CAM.px * R3D_PAN_SCALE;
  const eye = [pan, R3D_EYE_H, -R3D_EYE_BACK];
  const center = [pan * 0.12, 0, R3D_DEPTH * 0.5];
  R3D.view = m4LookAt(eye, center, [0, 1, 0]);
  R3D.proj = m4Perspective(R3D_FOV, Math.max(0.1, W / H), R3D_NEAR, R3D_FAR);
  R3D.viewProj = m4Multiply(R3D.proj, R3D.view);
}
// A billboard's texture key — distinct look, distinct texture. Coarse seed
// bucketing keeps texture count small while still varying siblings.
function r3dSpriteKey(el){
  const bp = el.burn && el.burn.phase;
  return el.k + '|' + (el.p ? JSON.stringify(el.p) : '') + '|' + (el.ch || '') + '|' + (bp || '') + '|' + (el.seed % 5);
}
// Scans the just-rasterized stamp for its actual drawn-content bounding
// box (alpha>10) — this is what makes the billboard TIGHT instead of a
// huge, mostly-transparent quad (the bug that broke the pilot's first two
// attempts: a quad sized to the whole canvas clips unpredictably against
// the near plane). Ground/bottom always uses R3D_STAMP_ANCHOR — the row
// every stub was rasterized against — even if content's own lowest pixel
// sits a hair off it, so different kinds' ground points stay consistent.
function r3dContentBounds(){
  const d = R3D.stampCtx.getImageData(0, 0, R3D_STAMP, R3D_STAMP).data;
  let minX = R3D_STAMP, maxX = 0, minY = R3D_STAMP, maxY = 0, found = false;
  for (let y = 0; y < R3D_STAMP; y++) for (let x = 0; x < R3D_STAMP; x++){
    if (d[(y * R3D_STAMP + x) * 4 + 3] > 10){
      found = true;
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y;
    }
  }
  if (!found) return { u0: 0.5, u1: 0.5, vTop: R3D_STAMP_ANCHOR, vBottom: R3D_STAMP_ANCHOR, wPx: 0, hPx: 0 };
  const anchorPx = R3D_STAMP_ANCHOR * R3D_STAMP;
  return {
    u0: minX / R3D_STAMP, u1: maxX / R3D_STAMP,
    vTop: minY / R3D_STAMP, vBottom: R3D_STAMP_ANCHOR,
    wPx: maxX - minX, hPx: Math.max(1, anchorPx - minY),

}
function r3dEnsureTexture(el, now){
  const key = r3dSpriteKey(el);
  let rec = R3D.textures.get(key);
  if (rec && now - rec.built < R3D_REFRESH_MS) return rec;
  const draw = ELEMENT_DRAW[el.k];
  const stub = { ...el, x: 0.5, y: R3D_STAMP_ANCHOR, s: 1 };
  const savedW = W, savedH = H, savedS = S, savedWX = wx;
  W = R3D_STAMP; H = R3D_STAMP; S = R3D_STAMP_S; wx = R3D.stampCtx;
  wx.clearRect(0, 0, R3D_STAMP, R3D_STAMP);
  RASTERIZING_SPRITE = true;
  try { drawGroundMatter(stub, draw, now, 1); } finally { RASTERIZING_SPRITE = false; }
  const bounds = r3dContentBounds();
  W = savedW; H = savedH; S = savedS; wx = savedWX;
  const gl = R3D.gl;
  const tex = (rec && rec.tex) || gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  // NO flip: the UV formula above (vTop/vBottom from raw canvas row/STAMP)
  // already matches the stamp canvas's own row order directly — flipping
  // here would sample the wrong (transparent) region (found via the pilot's
  // "draws with no GL error, zero visible pixels" debugging session)
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, R3D.stampCanvas);

  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

function r3dRenderFrame(now){

  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.useProgram(R3D.program);
  gl.bindBuffer(gl.ARRAY_BUFFER, R3D.quadBuf);
  gl.enableVertexAttribArray(R3D.aCorner);
  gl.vertexAttribPointer(R3D.aCorner, 2, gl.FLOAT, false, 0, 0);
  gl.uniformMatrix4fv(R3D.uViewProj, false, R3D.viewProj);
  gl.uniformMatrix4fv(R3D.uView, false, R3D.view);
  gl.uniform3f(R3D.uFogColor, 0.925, 0.890, 0.812);
  gl.uniform1f(R3D.uFogNear, R3D_FOG_NEAR);
  gl.uniform1f(R3D.uFogFar, R3D_FOG_FAR);
  gl.uniform1i(R3D.uTex, 0);
  gl.activeTexture(gl.TEXTURE0);
  for (const el of state.world.els){
    if (el.transit || DEPTH_EXEMPT[el.k]) continue;
    const age = el.born ? now - el.born : 1e9;
    if (age < 0) continue;
    const pe = 1 - Math.pow(1 - Math.max(0, Math.min(1, age / 700)), 3);
    const rec = r3dEnsureTexture(el, now);
    if (!rec.bounds.wPx) continue; // nothing drawn this refresh — skip rather than show a blank quad
    gl.bindTexture(gl.TEXTURE_2D, rec.tex);
    const pos = r3dWorldPos(el);
    const scale = R3D_PX_WORLD * el.s * pe;
    gl.uniform3f(R3D.uCenter, pos[0], pos[1], pos[2]);
    gl.uniform2f(R3D.uContentSize, Math.max(0.01, rec.bounds.wPx * scale), rec.bounds.hPx * scale);
    gl.uniform4f(R3D.uUVRect, rec.bounds.u0, rec.bounds.vTop, rec.bounds.u1, rec.bounds.vBottom);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
}
// Screen-space projection of a world element, shared by the 2D and R3D
// paths (branches internally) — used wherever presentation code (transit
// flight, arrival banner) needs "where does this element appear on screen"
// without caring which renderer is active.
function elScreenPos(el){
  if (R3D_ON && R3D.ready) return projectR3D(el);
  return { x: worldScreenX(el) + camShiftFor(el) / W, y: el.y, k: depthK(el) };
}
function projectR3D(el){
  const wp = r3dWorldPos(el);
  const clipG = m4TransformPoint(R3D.viewProj, [wp[0], wp[1], wp[2], 1]);
  const clipU = m4TransformPoint(R3D.viewProj, [wp[0], wp[1] + 1, wp[2], 1]);
  const yG = 1 - ((clipG[1] / clipG[3]) * 0.5 + 0.5);
  const yU = 1 - ((clipU[1] / clipU[3]) * 0.5 + 0.5);
  const x = (clipG[0] / clipG[3]) * 0.5 + 0.5;
  const k = Math.max(0.05, Math.abs(yG - yU) / R3D_SCALE_REF);
  return { x, y: yG, k };

// Ground-matter pass for the WebGL pilot: sky elements + the existing 2D
// backdrop already drew into wx by the time drawWorld calls this; billboard
// matter renders into the GL canvas and composites on top (transparent
// background, so the sky/backdrop show through the gaps), then live-heat
// glow (E2 ignition, fire↔flammable) redraws on the `ex` overlay at its
// true projected position, and fresh-lock gold rings finish the parity
// with the 2D loop's per-element cues.
function drawGroundR3D(now){
  const worldCtx = wx;
  for (const el of state.world.els){
    if (!DEPTH_EXEMPT[el.k] || el.transit) continue;
    const age = el.born ? now - el.born : 1e9;
    if (age < 0) continue;
    const pe = 1 - Math.pow(1 - Math.max(0, Math.min(1, age / 700)), 3);
    const draw = ELEMENT_DRAW[el.k];
    wx = worldCtx; wx.save();
    if (draw) draw(el, now, pe);

  wx = worldCtx;
  wx.drawImage(R3D.glCanvas, 0, 0, W, H);
  for (const el of state.world.els){
    if (el.transit || DEPTH_EXEMPT[el.k]) continue;
    const age = el.born ? now - el.born : 1e9;
    if (age < 0) continue;
    const bp = el.burn && el.burn.phase;
    if (bp && bp !== 'ash' && bp !== 'sprout' && bp !== 'sapling'){
      const pos = elScreenPos(el);
      drawBurnFx(el, now, 1, { X: pos.x * W, Y: pos.y * H, s: el.s * pos.k });

      wx.globalAlpha = (1 - q) * 0.6;
      wx.strokeStyle = GOLD; wx.lineWidth = 2.5;
      wx.beginPath(); wx.arc(pos.x * W, pos.y * H - S * 0.03, 10 + q * S * 0.12, 0, Math.PI * 2); wx.stroke();
      wx.restore();
    }
  }
}

</script>
