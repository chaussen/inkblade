name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -euo pipefail
          ARTIFACT=$(node -e "
            const id = require('fs').readFileSync('BUILD_ID', 'utf8').trim();
            console.log('inkblade-' + id.match(/^S1-(M[^-]+)-b/)[1].toLowerCase() + '.html');
          ")
          if [ ! -f "$ARTIFACT" ]; then
            echo "::error::BUILD_ID names $ARTIFACT but that file doesn't exist"
            exit 1
          fi
          echo "Publishing $ARTIFACT as game.html"
          mkdir -p _site
          cp "$ARTIFACT" _site/game.html
          cp -r packs _site/packs
          cp site/index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
