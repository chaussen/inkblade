const DEPTH_SCALE_FAR  = 0.42;
const DEPTH_SCALE_NEAR = 1.45;
const DEPTH_EXEMPT = { horizon: 1, sun: 1, moon: 1 }; // sky + the fixed reference line
const MIST_TOP = 0.55, MIST_BOTTOM = 0.72, MIST_ALPHA = 0.26;
// Second mist stage [LEAN — S1-D061]: a gentler dissolve continuing into the
// midfield, so atmosphere fades continuously with distance (it also covers
// world particles — renderers own their internal alphas, so atmospheric fade
// lives in the compositor, not per element).
const MIST2_TOP = 0.72, MIST2_BOTTOM = 0.86, MIST2_ALPHA = 0.09;

// at the near edge it is uncompressed. Render-only — el.x stays world-space
// (saves, E1/E2 distances untouched).
const PERSP_FAR = 0.80;
// Contact shadow [LEAN — S1-D061]: the ground-anchor ellipse under matter.

// Fire is light, and light reads through paper [LEAN — S1-D045]: live heat

    const a = Math.random() * Math.PI, l = 2 + Math.random() * 9;
    p.strokeStyle = Math.random() < 0.5 ? 'rgba(126,104,70,0.045)' : 'rgba(90,80,60,0.035)';

  // sky/ground division so the scroll reads as a SCENE even before anything
  // is written. All washes stay far above every ink-probe threshold — this
  // is tinted silk, not ink. No content is painted (no mountains, no
  // horizon line — those are the player's to write).
  const skyG = p.createLinearGradient(0, 0, 0, GROUND_FAR * H);
  skyG.addColorStop(0, 'rgba(206,216,224,0.20)');
  skyG.addColorStop(1, 'rgba(206,216,224,0)');

  for (let i = 0; i < 260; i++) {

  for (const [n, c] of [['heng', 0], ['dr', 45], ['shu', 90], ['pie', 135]]) {

/* ==== src/08-persist.js ==== */
/* ========================= 08 PERSISTENCE ========================= *
 * Versioned saves + append-only migrations (S1-D026). A player's
 * world is never destroyed on upgrade (Q12): migrations only add
 * fields; unknown kinds are carried forward verbatim and self-heal
 * at render time (seal fallback, C3). The raw pre-migration payload
 * is copied once to a backup key before the first v2 write.
 * ================================================================== */
// Append-only: never edit an existing entry, only add the next version step.
const MIGRATIONS = {
  1: d => ({
    version: 2,
    els: (d.els || []).map(e => ({ ...e, cls: e.cls !== undefined ? e.cls : classOfKind(e.k) })),
  }),
};
function migrateSave(raw) {
  let d = JSON.parse(raw);
  let from = d.version || 1;
  let migrated = false;
  while (from < SAVE_VERSION) {
    if (!MIGRATIONS[from]) throw new Error('no migration from save v' + from);
    d = MIGRATIONS[from](d);
    from = d.version;
    migrated = true;
  }
  if (from > SAVE_VERSION) throw new Error('save from a future build (v' + from + ')');
  return { d, migrated };
}
function initWorld() {
  if (QUERY.get('reset')) { try { localStorage.removeItem(WORLD_KEY); } catch (e) {} }
  try {
    const raw = localStorage.getItem(WORLD_KEY);
    if (raw) {
      const { d, migrated } = migrateSave(raw);
      if (migrated) {
        try { if (!localStorage.getItem(WORLD_BACKUP_KEY)) localStorage.setItem(WORLD_BACKUP_KEY, raw); } catch (e) {}
      }
      state.world.els = d.els || [];
    }
  } catch (e) { console.warn('[S1] world load failed, starting fresh:', e.message); }
  // ash decays across sessions by wall clock — the scroll remembers, then
  // heals (S1-D020). Lifecycle completion is not destruction; e1.destructions
  // stays untouched here by design.
  state.world.els = state.world.els.filter(el => {
    if (!el.life || el.life.phase !== 'ash' || !el.life.wall) return true;
    el.life.t += Math.max(0, Date.now() - el.life.wall);
    return !(ECOLOGY && el.life.t >= ECOLOGY.ashDecayMs);
  });
  for (const el of state.world.els) el.born = 0;
  METRICS.world.elements = state.world.els.length;
}
function saveWorld() {
  try {
    localStorage.setItem(WORLD_KEY, JSON.stringify({
      version: SAVE_VERSION,
      els: state.world.els.map(({ k, x, y, s, seed, cls, ch, p, life, burn }) => ({
        k, x, y, s, seed, cls, ch, p,
        life: life ? { phase: life.phase, fuel: life.fuel, t: life.t, wall: Date.now() } : undefined,
        // E2 burn walk (S1-D054): additive v2 field, Q12 holds — old builds
        // ignore it; like fire's mid-burn checkpoint, it freezes while away
        burn: burn ? { phase: burn.phase, fuel: burn.fuel, t: burn.t } : undefined,
      })),
    }));
  } catch (e) {}
}

/* ==== src/09-world-sim.js ==== */
/* ========================= 09 WORLD SIM ========================= *
 * The persistent living scroll (S1-D016/D017). Planting is driven
 * entirely by pack data (`world` field): tier-1 kind + params, or
 * null → seal fallback (C3: no character locks without leaving a
 * mark). The v1 14-case switch is deleted (S1-D021.3).
 * `?seed=` routes world randomness through the seeded rng for
 * deterministic ecology scenarios (S1-D025).
 * ================================================================ */
function clamp01(v){ return Math.max(0.04, Math.min(0.96, v)); }
function rng(seed){ let t = seed>>>0; return ()=>{ t+=0x6D2B79F5; let r=Math.imul(t^t>>>15,1|t); r^=r+Math.imul(r^r>>>7,61|r); return ((r^r>>>14)>>>0)/4294967296; }; }
const worldRand = SEED_PARAM !== null ? rng(parseInt(SEED_PARAM, 10) || 1) : Math.random;

function placeEl(k, s, isNew){
  const [y1, y2] = bandFor(k);
  // Placement is a dice roll, not an aim (S1-D059, supersedes S1-D052/D053):
  // John's playtest ruling — release point is low priority, interactions
  // should emerge from things randomly landing near each other, not from a
  // targeting act. Candidates scored by 2D distance to same-kind neighbors
  // only (the depth field, S1-D041, fills in both axes, not a strip).
  let bx = 0.5, by = (y1 + y2) / 2, bd = -1e9;
  for (let i = 0; i < 10; i++){
    const cx = 0.08 + worldRand() * 0.84;
    const cy = y1 + worldRand() * (y2 - y1);
    let d = 1e9;
    for (const e of state.world.els) if (e.k === k) d = Math.min(d, Math.hypot(e.x - cx, e.y - cy));
    if (d > bd) { bd = d; bx = cx; by = cy; }
  }
  const el = {
    k, x: bx, y: by, s,
    seed: Math.floor(worldRand()*1e9), cls: classOfKind(k),
    born: performance.now(), fresh: !!isNew,
  };
  // event-class matter is mortal (S1-D020 R4): larger fires carry more fuel
  if (ECOLOGY && kindHasTag(k, 'mortal')) {
    el.life = { phase: 'burning', fuel: ECOLOGY.fire.fuelMs * s, t: 0, flare: 0, nextFlare: flareIn() };
  }
  if (UNIQUE[k]) state.world.els = state.world.els.filter(e => e.k !== k);
  state.world.els.push(el);
  while (state.world.els.length > WORLD_CAP) {
    const i = state.world.els.findIndex(e => !UNIQUE[e.k]);
    if (i < 0) break;
    state.world.els.splice(i, 1);
  }
  METRICS.world.elements = state.world.els.length;
  return el;
}
function spawnWorldFor(def, isNew){
  const wp = def.world;
  const kindKey = wp && (wp.kind || wp.class); // tier 1 = bespoke kind; tier 2 = class family
  if (!kindKey) { plantSeal(def, isNew); saveWorld(); return; } // seal fallback (C3: no lock without a mark)
  const P = wp.params || {};
  const v = () => 0.8 + worldRand() * 0.45; // per-instance body variance
  const s0 = (P.scale || 1) * (P.vary === false ? 1 : v());
  const base = placeEl(kindKey, s0, isNew);
  if (wp.tier === 2) base.p = P; // per-char skin params, persisted with the element
  for (const dx of (P.offsets || [])) {
    const m = placeEl(kindKey, (P.memberScale || 0.9) * v(), isNew);
    m.x = clamp01(base.x + dx);
    // a group shares its base's depth (±jitter) — 林 is one grove, not
    // trees scattered across the field
    const [gy1, gy2] = bandFor(kindKey);
    m.y = Math.max(gy1, Math.min(gy2, base.y + (worldRand() - 0.5) * 0.03));
    if (wp.tier === 2) m.p = P;
  }
  saveWorld();
}
function plantSeal(def, isNew){
  const el = placeEl('seal', 1, isNew);
  el.ch = def.ch; // the seal bears the character's form (C3)
}

/* ---------------- ecology E1 (S1-D020) ---------------- *
 * Reactive only. All thresholds and clocks come from pack data
 * (ECOLOGY); the engine knows tags, not tuning. Invariant: nothing
 * the player has planted is ever destroyed or degraded in E1 —
 * the only removals here are the fire lifecycle completing (event-
 * class mortality, R4) which is design, not destruction, and is
 * counted in e1.burnouts, never e1.destructions. E2 (heat ignites
 * flammable) is HARD-GATED: E2_ENABLED is false, no ignition code
 * ships until the OPEN-14 choice-axis design exists.
 * ------------------------------------------------------ */
function flareIn(){ const [a, b] = ECOLOGY.fire.flareEveryMs; return a + worldRand() * (b - a); }

// A live heat event — the render's burn-through predicate and the sim's heat
// source are one definition (S1-D045).
function isLiveHeat(el){
  return !!(ECOLOGY && el.life && kindHasTag(el.k, 'heat') && ECOLOGY.fire.heatPhases.includes(el.life.phase));
}
function heatSources(){
  return state.world.els.filter(isLiveHeat);
}
function updateWorld(dt, now){
  if (!ECOLOGY || !state.world.els.length) return;
  let removed = false;
  const fires = heatSources();
  const aura = ECOLOGY.heatAuraR || 0;
  for (const el of state.world.els){
    if (el.life) updateFireLife(el, dt);
    if (el.burn) updateBurnLife(el, dt);
    if (kindHasTag(el.k, 'living')) updateAgent(el, dt, fires);
    // transient heat-aura cue (never persisted): renderers answer it —
    // trees shimmer, water steams, walkers stand hearth-calm
    el.hot = aura > 0 && !kindHasTag(el.k, 'heat') && fires.some(f => elDist(el, f) < aura);
  }
  if (E2_ON) updateIgnition(dt, fires);
  const before = state.world.els.length;
  state.world.els = state.world.els.filter(el => !(el.life && el.life.phase === 'gone'));
  if (state.world.els.length !== before) { removed = true; METRICS.world.elements = state.world.els.length; }
  if (removed) saveWorld(); // the scroll healed — persist it
}
function updateFireLife(el, dt){
  const L = el.life, F = ECOLOGY.fire;
  if (L.nextFlare === undefined){ L.flare = 0; L.nextFlare = flareIn(); } // restored mid-burn from a save
  L.t += dt;
  if (L.phase === 'burning'){
    L.fuel -= dt;
    if (L.flare > 0) L.flare -= dt;
    // the flare doubles as the mid-burn save checkpoint (Q12: remaining
    // fuel survives a reload without per-frame localStorage churn)
    else { L.nextFlare -= dt; if (L.nextFlare <= 0){ L.flare = F.flareMs; L.nextFlare = flareIn(); sfxWorldCue('crackle'); saveWorld(); } }
    if (L.fuel <= 0){ L.phase = 'embers'; L.t = 0; L.flare = 0; METRICS.e1.burnouts++; saveWorld(); }
  } else if (L.phase === 'embers'){
    if (L.t >= F.emberMs){ L.phase = 'smoke'; L.t = 0; saveWorld(); }
  } else if (L.phase === 'smoke'){
    if (L.t >= F.smokeMs){ L.phase = 'ash'; L.t = 0; saveWorld(); }
  } else if (L.phase === 'ash'){
    if (L.t >= ECOLOGY.ashDecayMs) L.phase = 'gone';
  }
}
/* ---------------- ecology E2 (S1-D049/S1-D054, gated by E2_ON) ---------------- *
 * Ignition transforms, never destroys: a kindled element keeps its kind and
 * seed and walks burn → ash → sprout → sapling → ITSELF. Only live heat
 * ignites (heatSources() — fire kinds; burning matter never joins it, so
 * chains stop at one hop per S1-D049c; the sun has no life and never
 * ignites). All radii and clocks are pack data — no ignition block in the
 * pack, no ignition in the world.
 * ------------------------------------------------------------------------------ */
function updateIgnition(dt, fires){
  const IG = ECOLOGY && ECOLOGY.ignition;
  if (!IG || !ECOLOGY.regrow || !fires.length) return;
  for (const el of state.world.els){
    if (el.burn || el.life || !kindHasTag(el.k, 'flammable')) continue;
    // dwell accumulates as a rate so mixed flame/ember exposure adds honestly;
    // embers kindle slower and closer (S1-D049d — the smolder-catch stays legible)
    let rate = 0;
    for (const f of fires){
      const P = IG[f.life.phase === 'burning' ? 'flame' : 'ember'];
      if (P && elDist(el, f) < P.r) rate = Math.max(rate, 1 / P.dwellMs);
    }
    if (rate){
      el.kindleT = (el.kindleT || 0) + dt * rate;
      if (el.kindleT >= 1){
        delete el.kindleT;
        el.burn = { phase: 'burning', fuel: ECOLOGY.fire.fuelMs * el.s, t: 0, flare: 0, nextFlare: flareIn() };
        METRICS.e2.ignitions++;
        sfxWorldCue('crackle');
        saveWorld();
      }
    } else if (el.kindleT) el.kindleT = Math.max(0, el.kindleT - dt / (IG.coolMs || 1));

}
function updateBurnLife(el, dt){
  const B = el.burn, F = ECOLOGY.fire, R = ECOLOGY.regrow;
  if (B.nextFlare === undefined){ B.flare = 0; B.nextFlare = flareIn(); } // restored mid-burn from a save
  B.t += dt;
  if (B.phase === 'burning'){
    B.fuel -= dt;
    if (B.flare > 0) B.flare -= dt;
    else { B.nextFlare -= dt; if (B.nextFlare <= 0){ B.flare = F.flareMs; B.nextFlare = flareIn(); sfxWorldCue('crackle'); saveWorld(); } }
    if (B.fuel <= 0){ B.phase = 'embers'; B.t = 0; B.flare = 0; saveWorld(); }
  } else if (B.phase === 'embers'){
    if (B.t >= F.emberMs){ B.phase = 'smoke'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'smoke'){
    if (B.t >= F.smokeMs){ B.phase = 'ash'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'ash'){
    if (B.t >= R.ashMs){ B.phase = 'sprout'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'sprout'){
    if (B.t >= R.sproutMs){ B.phase = 'sapling'; B.t = 0; saveWorld(); }
  } else if (B.phase === 'sapling'){
    // the same seed grows back: regrowth completes the covenant
    if (B.t >= R.saplingMs){ delete el.burn; METRICS.e2.regrowths++; saveWorld(); }

function updateAgent(el, dt, fires){
  const E = ECOLOGY;
  if (!el.beh) el.beh = { home: el.x, mode: 'wander', hopT: 0, warmed: false, restCd: 0, restT: 0 };
  const B = el.beh;
  if (B.hopT > 0) B.hopT -= dt;
  if (B.restCd > 0) B.restCd -= dt;
  let near = null, nd = 1e9;
  for (const f of fires){ const d = elDist(el, f); if (d < nd){ nd = d; near = f; } }

  // R2: startle + flee re-center away; return after the fire dies
  if (near && nd < dangerNow && B.mode !== 'flee' && B.mode !== 'avoid'){
    B.mode = 'flee'; B.hopT = 400; B.restT = 0;
    const dir = Math.sign(el.x - near.x) || (worldRand() < 0.5 ? -1 : 1);
    B.target = clamp01(near.x + dir * E.fleeDist);
    METRICS.e1.startles++;
    sfxWorldCue('startle');
  }
  const speed = E.walkSpeed * (B.mode === 'flee' ? E.fleeSpeedMult : 1) * dt / 1000;

    el.x = stepX(el.x, B.target, speed);
    if (el.x === B.target) B.mode = 'avoid';
  } else if (B.mode === 'avoid'){
    if (!near) B.mode = 'return'; // fire died — come back
  } else if (B.mode === 'return'){
    el.x = stepX(el.x, B.home, speed);
    if (el.x === B.home){ B.mode = 'wander'; B.warmed = false; }
  } else if (B.mode === 'rest'){
    B.restT -= dt;
    if (B.restT <= 0){ B.mode = 'wander'; B.restCd = E.restCooldownMs; }
  } else { // wander
    // R1: comfort-radius warming — drift toward the fire, loiter at warmDist
    if (near && nd < E.comfortR && nd > E.warmDist){
      const dir = Math.sign(near.x - el.x) || 1;
      el.x = stepX(el.x, clamp01(near.x - dir * E.warmDist), speed);
      if (!B.warmed){ B.warmed = true; METRICS.e1.warmings++; }
    } else if (!near) B.warmed = false;
    // R3: an occasional rest beat under shelter
    if (B.restCd <= 0){
      const sheltered = state.world.els.some(e => e !== el && kindHasTag(e.k, 'shelter') && elDist(el, e) < E.shelterR);
      if (sheltered && worldRand() < E.restChancePerSec * dt / 1000){

  }
}
function stepX(x, target, maxStep){
  const d = target - x;

/* ==== src/10-world-render.js ==== */
/* ========================= 10 WORLD RENDER ========================= *
 * Elements draw into the offscreen world layer (`wx`), which the
 * frame composites at the attention worldAlpha — recession is an
 * exact global-alpha multiplier on the whole world plane (S1-D019).
 * Kind → draw fn is a registry; kinds without an entry render as a
 * seal/stele (C3 self-healing — old saves with unknown kinds keep
 * their marks). World-born particles (leaves, embers) live in the
 * world layer so they recede with it.
 * =================================================================== */
const ELEMENT_DRAW = {
  tree: drawTreeEl, fire: drawFireEl, walker: drawWalkerElSolo, crowd: drawCrowdEl,
  resttree: drawRestTreeEl, peak: drawPeakEl, ridge: drawRidgeEl,
  terrace: drawTerraceEl, horizon: drawHorizonEl, path: drawPathEl, seal: drawSealEl,
  sun: drawSunEl, moon: drawMoonEl, field: drawFieldEl, water: drawWaterEl,
  flora: drawFloraEl, terrain: drawTerrainEl, figure: drawFigureEl,
};
function drawWorld(dt, now){
  // the backdrop means an empty world is still a place (S1-D063/D064) —
  // the old empty-world early-return is gone
  METRICS.perf.worldLayer = state.world.els.length > 0 || state.worldParticles.length > 0;
  const worldCtx = wx;
  worldCtx.clearRect(0, 0, W, H);
  ex.clearRect(0, 0, W, H);
  drawBackdrop(now);
  // painter's algorithm down the depth axis (S1-D041): sky first, then
  // ground far→near so near occludes far — y is depth
  const els = [...state.world.els].sort((a, b) =>
    (ZI[a.k] === 0 ? -1 : a.y) - (ZI[b.k] === 0 ? -1 : b.y));
  drawContactShadows(els, now);
  for (const el of els){
    const age = el.born ? now - el.born : 1e9;
    if (age < 0) continue; // planted between frames; rAF timestamp lags performance.now()
    const p = Math.max(0, Math.min(1, age / 700));
    const pe = 1 - Math.pow(1 - p, 3);
    // live heat draws on the burn-through overlay (S1-D045); all else recedes
    wx = isLiveHeat(el) ? ex : worldCtx;
    const k = depthK(el);
    wx.save();
    // perspective convergence (S1-D061): shift the whole element to its
    // converged screen x — renderers keep drawing at el.x*W and inherit it
    const cdx = (worldScreenX(el) - el.x) * W;
    if (cdx) wx.translate(cdx, 0);
    if (k !== 1){
      // scale the whole element (line weights included) about its ground anchor
      const ax = el.x * W, ay = el.y * H;
      wx.translate(ax, ay); wx.scale(k, k); wx.translate(-ax, -ay);
    }
    const draw = ELEMENT_DRAW[el.k];
    // E2 burn walk (S1-D054): a kindled element's regrowth phases REPLACE its
    // form (ash mound → sprout → sapling of the SAME seed growing back);
    // while it burns, its matter stays on the world layer and its fire is
    // drawn as light on the burn-through overlay.
    const bp = el.burn && el.burn.phase;
    if (bp === 'ash') drawBurnAsh(el, now, pe);
    else if (bp === 'sprout') drawBurnSprout(el, now, pe);
    else if (bp === 'sapling'){
      const q = ECOLOGY && ECOLOGY.regrow ? Math.min(1, el.burn.t / ECOLOGY.regrow.saplingMs) : 1;
      const young = { ...el, s: el.s * (0.35 + 0.65 * q) };
      if (draw) draw(young, now, pe); else { el.sealFallback = true; drawSealEl(el, now, pe); }
    } else {
      if (draw) draw(el, now, pe);
      else { el.sealFallback = true; drawSealEl(el, now, pe); } // unknown kind self-heals to a seal
      if (bp) drawBurnFx(el, now, pe);
    }
    if (el.fresh && age < 900){
      const q = age / 900;
      wx.save();
      wx.globalAlpha = (1 - q) * 0.6;
      wx.strokeStyle = GOLD; wx.lineWidth = 2.5;
      wx.beginPath(); wx.arc(el.x * W, el.y * H - S * 0.03, 10 + q * S * 0.12, 0, Math.PI * 2); wx.stroke();
      wx.restore();
    }
    wx.restore();
  }
  wx = worldCtx;
  drawMist();
  drawWorldParticles(dt);
  ctx.save();
  ctx.globalAlpha = attention.worldAlpha;
  ctx.drawImage(worldLayer, 0, 0, W, H);
  // fire is light: live events hold ≥EVENT_MIN_ALPHA under the veil
  ctx.globalAlpha = Math.max(attention.worldAlpha, EVENT_MIN_ALPHA);
  ctx.drawImage(eventLayer, 0, 0, W, H);
  ctx.restore();
}
/* -------- the illustrated valley (S1-D063/D064) -------- *
 * An always-present backdrop so the world reads as a PLACE, not a void:
 * distant ridgelines, drifting clouds, ground tufts with perspective
 * density. Pure presentation furniture — no pack content, no save impact,
 * laid out from a FIXED seed (the valley is the same place every session;
 * ?seed= world randomness is untouched). It draws on the world layer, so
 * it recedes behind the veil while writing and blooms on lock like the
 * rest of the living scroll. Geometry is cached per resize; the per-frame
 * cost is a handful of path fills. Tones sit far above every ink-probe
 * threshold — silk, not ink (smoke18 T5/T6). */
let BACKDROP = null;
function buildBackdrop(){
  const r = rng(42);

  for (let i = 0; i < 3; i++){
    const baseY = 0.555 - i * 0.035;
    const pts = [];
    const n = 7 + Math.floor(r() * 3);
    for (let j = 0; j <= n; j++){
      const px = j / n;
      pts.push([px, baseY - (0.025 + r() * 0.045) * Math.sin(px * Math.PI * (1.5 + i * 0.5) + r() * 2) - r() * 0.012]);
    }
    ridges.push({ pts, baseY, alpha: 0.20 - i * 0.055 });
  }
  const clouds = [];
  for (let i = 0; i < 4; i++){
    clouds.push({
      x: r(), y: 0.10 + r() * 0.22, s: 0.5 + r() * 0.8,
      speed: 0.000007 + r() * 0.000005, puffs: 3 + Math.floor(r() * 2), seed: Math.floor(r() * 1e6),
    });
  }
  const tufts = [];
  for (let i = 0; i < 56; i++){
    const q = Math.pow(r(), 0.75); // denser near
    const y = GROUND_FAR + 0.03 + q * (1 - GROUND_FAR - 0.06);
    const f = PERSP_FAR + q * (1 - PERSP_FAR);
    tufts.push({ x: 0.5 + (r() - 0.5) * 0.96 * f, y, q, kind: r() < 0.75 ? 'grass' : 'pebble', seed: Math.floor(r() * 1e6) });
  }

  window.__S1_SCENE = { ridges: ridges.length, clouds: clouds.length, tufts: tufts.length };
}
function drawBackdrop(now){
  if (!BACKDROP) buildBackdrop();
  const B = BACKDROP;

/* ========================= 11 ATTENTION ========================= *
 * The figure-ground contract (S1-D019/D027): exactly one plane owns
 * attention, game state drives transitions. writing → glyph owns
 * (world recedes to ATTN_RECESSION behind the veil); bloom → world
 * owns (lock/fizzle through resolve, holding ATTN_HOLD_MS into the
 * next glyph); idle → title screen, world owns. Test-readable at
 * window.__S1_ATTN.
 * ================================================================ */
const attention = { mode: 'idle', worldAlpha: 1, veilAlpha: 0, holdUntil: 0 };
window.__S1_ATTN = attention;

function attentionOnGlyphAppear() {
  // bloom holds into the new glyph, then recedes (cadence-preserving
  // reading of "holds through resolve + ~1.5s after")
  if (METRICS.glyphs > 0) attention.holdUntil = performance.now() + ATTN_HOLD_MS;
}
function stepToward(cur, target, maxStep) {
  const d = target - cur;
  return Math.abs(d) <= maxStep ? target : cur + Math.sign(d) * maxStep;
}
function updateAttention(dt, now) {
  let mode;
  if (state.mode === 'play' && state.glyph && !state.glyph.done) mode = 'writing';
  else if (state.mode === 'resolve' || (state.glyph && state.glyph.done)) mode = 'bloom';
  else mode = 'idle';
  attention.mode = mode;
  const wTarget = (mode === 'writing' && now >= attention.holdUntil) ? ATTN_RECESSION : 1;
  const vTarget = mode === 'writing' ? ATTN_VEIL_ALPHA : 0;
  const wRange = 1 - ATTN_RECESSION;
  const wMs = wTarget < attention.worldAlpha ? ATTN_RECEDE_MS : ATTN_BLOOM_MS;
  attention.worldAlpha = stepToward(attention.worldAlpha, wTarget, dt / wMs * wRange);
  attention.veilAlpha = stepToward(attention.veilAlpha, vTarget, dt / ATTN_VEIL_MS * ATTN_VEIL_ALPHA);

// The writing veil: a fresh leaf laid over the scroll behind the glyph.
// Drawn between the world layer and the glyph.
function drawVeil() {

  const pad = S * ATTN_VEIL_PAD;
  const [x, y, w, h] = glyphBBox(state.glyph, pad);
  const cx = x + w/2, cy = y + h/2;
  const R = Math.hypot(w, h) * 0.62;
  const g = ctx.createRadialGradient(cx, cy, R * 0.55, cx, cy, R);
  const c = ATTN_VEIL_BRIGHT.slice(4, -1); // "r,g,b"

  g.addColorStop(1, 'rgba(' + c + ',0)');
  ctx.save();
  ctx.fillStyle = g;
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
  ctx.restore();
}

  for (let i = 0; i <= 4; i++) {
    ctx.globalAlpha = 0.55 * Math.sin(q * Math.PI) * (1 - i/5.5);
    ctx.beginPath(); ctx.arc(pt[0] - dir[0]/L*i*11, pt[1] - dir[1]/L*i*11, 7 - i, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawTrails(dt) {
  for (const t of state.trails) {
    t.life -= dt / 420;
    if (t.life <= 0) continue;
    ctx.save();
    ctx.globalAlpha = Math.max(0, t.life) * 0.7;
    ctx.strokeStyle = t.gold ? GOLD : INK;
    ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(t.pts[0][0], t.pts[0][1]);
    for (const p of t.pts) ctx.lineTo(p[0], p[1]);
    ctx.stroke();
    ctx.restore();
  }
  state.trails = state.trails.filter(t => t.life > 0);
  if (trail && trail.length > 1) {
    ctx.save();
    ctx.globalAlpha = 0.75; ctx.strokeStyle = INK;
    ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(trail[0][0], trail[0][1]);
    for (const p of trail) ctx.lineTo(p[0], p[1]);
    ctx.stroke();
    ctx.restore();
  }
}
function drawParticles(dt) {
  for (const p of state.particles) {
    p.life -= dt / 1000;
    p.vy += p.grav * dt / 1000;
    p.x += p.vx * dt / 1000; p.y += p.vy * dt / 1000;
    if (p.life <= 0) continue;
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  state.particles = state.particles.filter(p => p.life > 0);
}
function drawHUD() {
  if (state.streak >= 2) {
    ctx.save();
    ctx.fillStyle = CINNABAR;
    ctx.font = '600 ' + Math.round(Math.min(W,H)*0.035) + 'px ' + CHAR_FONT;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('连 ' + state.streak, 18, 16);
    ctx.restore();
  }
  // Roster ledger (S1-D061, replaces the all-chars-in-one-row strip that
  // shrank to ~2px cells at 500 chars): a windowed strip of legible tiles
  // centered on the current character, with a locked/total counter. Reads
  // identically at 23 chars and 500.
  const n = CHARS.length;
  const win = Math.min(n, 11, Math.max(5, Math.floor((W - 140) / 36)));
  const cell = Math.min(44, Math.max(28, (W - 200) / win - 8));
  const curIdx = Math.max(0, state.glyph ? CHARS.indexOf(state.glyph.def) : 0);
  let lockedCount = 0;
  for (const c of CHARS) if (state.locked[c.ch]) lockedCount++;
  const lo = Math.max(0, Math.min(curIdx - (win >> 1), n - win));
  window.__S1_HUD = { cellPx: cell, win, lockedCount, total: n, lo };
  const total = win * (cell + 8) - 8;
  const y = H - cell - 14;
  ctx.save();
  // strip + counter centered as one group so the counter never overflows
  const counterFont = '600 ' + Math.max(12, cell * 0.34) + 'px Georgia, serif';
  const packId = (PACK && PACK.meta && PACK.meta.id) ? ' · ' + PACK.meta.id : '';
  const counterText = lockedCount + ' / ' + n + packId;
  ctx.font = counterFont;
  const counterW = ctx.measureText(counterText).width;
  let x = Math.max(8, (W - total - 14 - counterW) / 2);
  // a soft paper backdrop calms the ledger band — near-field world matter
  // (walkers wander to y≈0.96) stays visible but stops competing with tiles
  ctx.fillStyle = 'rgba(236,227,207,0.55)';
  roundRect(x - 10, y - 8, total + 14 + counterW + 26, cell + 16, 10); ctx.fill();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = lo; i < lo + win; i++) {
    const c = CHARS[i];
    // edge tiles fade when the roster continues past the window
    const edge = (i === lo && lo > 0) || (i === lo + win - 1 && lo + win < n);
    ctx.globalAlpha = edge ? 0.4 : 1;
    if (i === curIdx) {
      const grow = cell * 0.14;
      ctx.strokeStyle = GOLD; ctx.lineWidth = 2.2;
      roundRect(x - grow/2, y - grow, cell + grow, cell + grow, 7); ctx.stroke();
      ctx.fillStyle = state.locked[c.ch] ? CINNABAR : 'rgba(70,62,48,0.55)';
      ctx.font = '600 ' + (cell * 0.7) + 'px ' + CHAR_FONT;
      ctx.fillText(c.ch, x + cell/2, y + cell/2 - grow/2 + cell*0.04);
    } else if (state.locked[c.ch]) {
      ctx.fillStyle = CINNABAR;
      roundRect(x, y, cell, cell, 6); ctx.fill();
      ctx.fillStyle = '#f3e9d6';
      ctx.font = (cell * 0.62) + 'px ' + CHAR_FONT;
      ctx.fillText(c.ch, x + cell/2, y + cell/2 + cell*0.04);
    } else {
      ctx.strokeStyle = 'rgba(70,62,48,0.25)'; ctx.lineWidth = 1.2;
      roundRect(x, y, cell, cell, 6); ctx.stroke();
      ctx.fillStyle = 'rgba(70,62,48,0.28)';
      ctx.beginPath(); ctx.arc(x + cell/2, y + cell/2, 2.2, 0, Math.PI*2); ctx.fill();
    }
    x += cell + 8;
  }
  // the ledger's counter: how much of this scroll's lexicon is yours
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = INK;
  ctx.font = counterFont;
  ctx.textAlign = 'left';
  ctx.fillText(counterText, x + 6, y + cell/2);
  ctx.restore();
  if (state.banner) {
    state.banner.t += 16;
    const bt = state.banner.t;
    const a = bt < 300 ? bt/300 : (bt > 2100 ? Math.max(0, 1 - (bt-2100)/400) : 1);
    if (a <= 0) { state.banner = null; }
    else {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.textAlign = 'center';
      ctx.fillStyle = INK;
      ctx.font = '600 ' + Math.round(Math.min(W,H)*0.05) + 'px ' + CHAR_FONT;
      ctx.fillText(state.banner.pinyin, W/2, GY + S + Math.min(H*0.055, 40));
      ctx.globalAlpha = a * 0.7;
      ctx.font = Math.round(Math.min(W,H)*0.026) + 'px Georgia, serif';
      ctx.fillText(state.banner.gloss, W/2, GY + S + Math.min(H*0.055, 40) + Math.min(W,H)*0.045);
      ctx.restore();
    }
  }
  ctx.save();
  ctx.globalAlpha = 0.35; ctx.fillStyle = INK;
  ctx.font = '10px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText(BUILD_ID, W - 6, H - 4);
  ctx.restore();
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
function drawTitle() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = INK;
  ctx.font = Math.round(Math.min(W,H)*0.22) + 'px ' + CHAR_FONT;
  ctx.textBaseline = 'middle';
  ctx.fillText('墨刃', W/2, H*0.38);
  ctx.font = '600 ' + Math.round(Math.min(W,H)*0.028) + 'px Georgia, serif';
  ctx.globalAlpha = 0.8;
  ctx.fillText('I N K B L A D E', W/2, H*0.38 + Math.min(W,H)*0.15);
  ctx.globalAlpha = 0.65;
  ctx.font = Math.round(Math.min(W,H)*0.022) + 'px Georgia, serif';
  ctx.fillText('Slash the strokes. True order has power.', W/2, H*0.62);
  ctx.globalAlpha = 0.45 + 0.25 * Math.sin(perfT/400);
  ctx.fillText('— slash anywhere to begin —', W/2, H*0.70);
  ctx.restore();
}
// First-glyph gesture hint (S1-D007): comet on the curriculum's opening
// character before the first-ever cut. Which character opens is pack data
// (meta.intro[0]); the hint additionally requires a single stroke so it can
// teach the slash without ever leaking order.
function drawFirstGlyphHint(dt, now) {
  const g = state.glyph;
  if (!g || !INTRO.length || g.def.ch !== INTRO[0] || g.def.strokes.length !== 1) return;
  if (METRICS.cuts > 0 || state.mode !== 'play') return;
  if (now - g.lastAct < 3500) return;
  const cyc = 1600;
  const p = (now % cyc) / cyc;
  if (p > 0.75) return;
  const q = p / 0.75;
  const st = g.strokes[0];
  const a = toScreen(st.pts[0]), b = toScreen(st.pts[st.pts.length - 1]);
  const x = a[0] + (b[0]-a[0]) * q, y = a[1];
  ctx.save();
  ctx.globalAlpha = 0.5 * Math.sin(q * Math.PI);
  ctx.fillStyle = INK;
  ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
  for (let i = 1; i <= 4; i++) {
    ctx.globalAlpha = 0.5 * Math.sin(q * Math.PI) * (1 - i/5);
    ctx.beginPath(); ctx.arc(x - i*11, y, 7 - i, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ==== src/13-main.js ==== */
/* ========================= 13 MAIN LOOP + BOOT ========================= */
let lastT = 0, perfT = 0, frameCount = 0;
function frame(now) {
  const dt = Math.min(50, now - lastT || 16);
  lastT = now; perfT = now;
  frameCount++;
  // frame-time probe (S1-D031: measure before pre-render machinery)
  if (frameCount > 10) {
    METRICS.perf.avgFrameMs = +(METRICS.perf.avgFrameMs * 0.98 + dt * 0.02).toFixed(2);
    METRICS.perf.worstFrameMs = Math.max(METRICS.perf.worstFrameMs, Math.round(dt));
  }

  updateAttention(dt, now);

  ctx.save();
  if (state.shake > 0 && !reduceMotion) {
    ctx.translate((Math.random()-0.5) * state.shake, (Math.random()-0.5) * state.shake);
    state.shake = Math.max(0, state.shake - dt / 40);
  }
  ctx.drawImage(paperTex, 0, 0, W, H);
  updateWorld(dt, now);
  drawWorld(dt, now);

  if (state.mode === 'title') {
    drawTitle();
  } else {
    drawVeil();
    drawGlyph(dt, now);
    drawFirstGlyphHint(dt, now);
    if (state.mode === 'play') maybeHint(now);
  }
  drawEffects(dt);
  drawParticles(dt);
  drawTrails(dt);
  if (state.mode !== 'title') drawHUD();
  ctx.restore();

  if (state.mode === 'resolve' && state.resolve) {
    state.resolve.t += dt;
    if (state.resolve.t >= state.resolve.dur) { state.resolve = null; advance(); }
  }
  requestAnimationFrame(frame);
}
async function boot() {
  loadEmbeddedPack();
  if (PACK_URL) await loadPackParam(PACK_URL);
  initWorld();
  requestAnimationFrame(frame);
  if (window.speechSynthesis) speechSynthesis.getVoices();
}
boot();
